<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pago cancelado | Café D’Medina</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #11100f;
      color: #f5f5f5;
      display: grid;
      place-items: center;
      min-height: 100vh;
      text-align: center;
    }

    .box {
      max-width: 520px;
      padding: 40px;
      border: 1px solid rgba(200,169,106,.3);
      border-radius: 24px;
      background: #1a1a1a;
    }

    h1 {
      color: #c8a96a;
      margin-bottom: 15px;
    }

    p {
      color: #ccc;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      background: #c8a96a;
      color: #000;
      padding: 12px 22px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn-secondary {
      background: transparent;
      color: #c8a96a;
      border: 1px solid #c8a96a;
      margin-left: 10px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Pago cancelado</h1>

    <p>No se ha realizado ningún cargo.</p>
    <p>Puedes volver a intentarlo cuando quieras.</p>

    <a href="tienda.html" class="btn">Volver a la tienda</a>
    <a href="index.html" class="btn btn-secondary">Inicio</a>
  </div>

</body>
</html>
