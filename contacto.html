<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto Comercial | Café D’Medina</title>

  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>

    body{
      margin:0;
      background:#11100f;
      color:#f5f5f5;
      font-family:'Lato',sans-serif;
    }

    header{
      padding:22px 7%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid rgba(200,169,106,.2);
      background:#0f0f0f;
    }

    header a{
      color:#c8a96a;
      text-decoration:none;
      font-weight:900;
    }

    header span{
      font-family:'Playfair Display',serif;
      color:#c8a96a;
      font-size:24px;
      font-weight:700;
    }

    .container{
      max-width:760px;
      margin:70px auto;
      padding:0 24px;
    }

    .box{
      background:#1a1a1a;
      border:1px solid rgba(200,169,106,.2);
      border-radius:30px;
      padding:50px;
    }

    h1{
      font-family:'Playfair Display',serif;
      color:#e2c47d;
      font-size:52px;
      margin-top:0;
      margin-bottom:18px;
      text-align:center;
    }

    .intro{
      text-align:center;
      color:#ddd;
      line-height:1.8;
      margin-bottom:40px;
    }

    label{
      display:block;
      margin-bottom:8px;
      margin-top:20px;
      color:#c8a96a;
      font-size:13px;
      font-weight:900;
      letter-spacing:1.5px;
      text-transform:uppercase;
    }

    input,
    textarea,
    select{
      width:100%;
      padding:15px 18px;
      border-radius:12px;
      border:1px solid rgba(200,169,106,.3);
      background:#11100f;
      color:#fff;
      font-size:15px;
      box-sizing:border-box;
      outline:none;
    }

    input:focus,
    textarea:focus,
    select:focus{
      border-color:#e2c47d;
      box-shadow:0 0 0 3px rgba(200,169,106,.15);
    }

    textarea{
      min-height:140px;
      resize:vertical;
    }

    .btn{
      width:100%;
      margin-top:34px;
      padding:18px;
      border:0;
      border-radius:40px;
      background:#c8a96a;
      color:#000;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      transition:.25s;
    }

    .btn:hover{
      background:#e2c47d;
    }

    .note{
      margin-top:28px;
      text-align:center;
      color:#aaa;
      font-size:14px;
      line-height:1.7;
    }

    @media(max-width:700px){

      .box{
        padding:34px 24px;
      }

      h1{
        font-size:40px;
      }

    }

  </style>
</head>
<body>

<header>
  <a href="index.html">← Volver</a>
  <span>Café D’Medina</span>
</header>

<div class="container">

  <div class="box">

    <h1>Contacto comercial</h1>

    <p class="intro">
      Trabajamos con distribuidores, cafeterías, hoteles, restaurantes,
      tiendas gourmet y clientes profesionales interesados en café de origen premium colombiano.
    </p>

    <form id="contact-form">

      <label>Nombre completo</label>
      <input type="text" name="nombre" required>

      <label>Empresa / Negocio</label>
      <input type="text" name="empresa">

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Teléfono</label>
      <input type="tel" name="telefono">

      <label>País</label>
      <input type="text" name="pais">

      <label>Tipo de cliente</label>
      <select name="tipo">
        <option>Distribuidor</option>
        <option>Cafetería</option>
        <option>Hotel</option>
        <option>Restaurante</option>
        <option>Tienda gourmet</option>
        <option>Otro</option>
      </select>

      <label>Volumen aproximado</label>
      <select name="volumen">
        <option>Menos de 10 kg / mes</option>
        <option>10 - 50 kg / mes</option>
        <option>50 - 100 kg / mes</option>
        <option>Más de 100 kg / mes</option>
      </select>

      <label>Mensaje</label>
      <textarea name="mensaje"></textarea>

      <button type="submit" class="btn">
        Solicitar información comercial
      </button>

    </form>

    <div class="note">
      Nuestro equipo comercial responderá lo antes posible.
    </div>

  </div>

</div>

<!-- ---------------------------------------------------------------------------------------------------------------------------------------------------------->
<script>
document.getElementById("contact-form").addEventListener("submit", async function(e){

  e.preventDefault();

  const formData = {
    nombre: document.querySelector('[name="nombre"]').value,
    empresa: document.querySelector('[name="empresa"]').value,
    email: document.querySelector('[name="email"]').value,
    telefono: document.querySelector('[name="telefono"]').value,
    pais: document.querySelector('[name="pais"]').value,
    tipo: document.querySelector('[name="tipo"]').value,
    volumen: document.querySelector('[name="volumen"]').value,
    mensaje: document.querySelector('[name="mensaje"]').value
  };

  const response = await fetch("https://cafedmedina-web.onrender.com/contacto",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify(formData)
  });

/*-------------------------------------------------------------------------------------------------------ABRE - ALERTA-------------------------------------------------------------------------------------
if(response.ok){
    alert("Solicitud enviada correctamente.");
    document.getElementById("contact-form").reset();
  } else {
    alert("Error enviando solicitud.");
  }*/


  if(response.ok){
  alert("Solicitud enviada correctamente.");
  document.getElementById("contact-form").reset();
} else {
  const errorText = await response.text();
  console.log("ERROR DEL SERVIDOR:", errorText);
  alert("Error enviando solicitud. Mira la consola.");
}
});
</script>
</body>
</html>
