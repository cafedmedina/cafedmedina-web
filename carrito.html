<div class="page-content">
  <div class="cart-box">

    <h1>Carrito</h1>

      <div id="cart-items"></div>

      <div class="cart-total">
        <span>Total:</span>
        <span id="cart-total">0,00 €</span>
      </div>

      <button class="btn" onclick="pagar()">
        Pagar ahora
      </button>

    </div>
  </div>

  <script src="https://js.stripe.com/v3/"></script>

  <script>
    // Stripe TEST
    const stripe = Stripe("pk_test_51TUB833gq8inlL2zJkDNL2xz4yOq0WAExmweTl5sRDxmC69Jl4bLRelvp0QGurwc4d0aP7xteOxGjWfqN5iBLKZ1000ITCPSNU");

    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

    function actualizarContador() {
      const cartCount = document.getElementById("cart-count");

      const unidades = carrito.reduce((sum, item) => {
        return sum + Number(item.cantidad || 0);
      }, 0);

      if (cartCount) {
        cartCount.textContent = unidades;
      }
    }

    function renderCart() {
      const cartItems = document.getElementById("cart-items");
      const cartTotal = document.getElementById("cart-total");

      actualizarContador();

      if (carrito.length === 0) {
        cartItems.innerHTML = `<div class="empty-cart">Tu carrito está vacío.</div>`;
        cartTotal.textContent = "0,00 €";
        localStorage.setItem("carrito", JSON.stringify(carrito));
        return;
      }

      cartItems.innerHTML = carrito.map((item, index) => {
        const subtotal = Number(item.precio) * Number(item.cantidad);

        return `
          <div class="cart-item">
            <strong>${item.nombre}</strong><br>
            ${item.peso} g · ${item.proceso}<br>
            ${item.molienda || ""} · ${item.tostion || ""}<br>
            Cantidad: ${item.cantidad}<br>

            <span class="cart-item-price">
              ${subtotal.toLocaleString("es-ES", {
                style: "currency",
                currency: "EUR"
              })}
            </span>

            <br>

            <button class="remove-btn" onclick="removeItem(${index})">
              Eliminar
            </button>
          </div>
        `;
      }).join("");

      const total = carrito.reduce((sum, item) => {
        return sum + Number(item.precio) * Number(item.cantidad);
      }, 0);

      cartTotal.textContent = total.toLocaleString("es-ES", {
        style: "currency",
        currency: "EUR"
      });
    }

    function removeItem(index) {
      carrito.splice(index, 1);
      localStorage.setItem("carrito", JSON.stringify(carrito));
      renderCart();
    }

    async function pagar() {
      if (carrito.length === 0) {
        alert("Tu carrito está vacío.");
        return;
      }

      const response = await fetch("https://cafedmedina-web.onrender.com/create-checkout-session", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ carrito })
      });

      const session = await response.json();

      stripe.redirectToCheckout({
        sessionId: session.id
      });
    }

    renderCart();
  </script>

</script>
