<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito | Café D’Medina</title>

  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --black: #11100f;
      --black-soft: #1a1714;
      --gold: #c8a96a;
      --gold-light: #e2c47d;
      --white: #ffffff;
      --muted: rgba(255,255,255,.78);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Lato', Arial, sans-serif;
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* HEADER */

    header {
      position: sticky;
      top: 0;
      z-index: 9999;

      height: 76px;
      padding: 0 7%;

      display: flex;
      align-items: center;
      justify-content: space-between;

      background: rgba(17,16,15,.97);
      border-bottom: 1px solid rgba(200,169,106,.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    header a {
      color: var(--gold-light);
      font-weight: 900;
      font-size: 15px;
    }

    header span.logo-text {
      color: var(--gold-light);
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: .4px;
    }

    .cart-icon {
      position: relative;
      cursor: pointer;
      color: var(--gold-light);
      font-size: 22px;
      font-weight: 900;
    }

    .cart-count {
      position: absolute;
      top: -10px;
      right: -14px;

      background: var(--gold-light);
      color: var(--black);

      font-size: 12px;
      font-weight: 900;

      min-width: 20px;
      height: 20px;
      padding: 2px 6px;

      display: flex;
      align-items: center;
      justify-content: center;

      border-radius: 50%;
    }

    /* CONTENIDO */

    .page-content {
      width: 100%;
      padding: 48px 7% 80px;
    }

    .cart-box {
      width: 100%;
      max-width: 780px;

      margin: 0 auto;
      padding: 36px;

      border-radius: 28px;
      background: var(--black-soft);
      border: 1px solid rgba(200,169,106,.28);
      box-shadow: 0 22px 50px rgba(0,0,0,.28);
    }

    .cart-box h1 {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      line-height: 1.1;
      margin-bottom: 24px;
      color: var(--white);
    }

    #cart-items {
      font-size: 16px;
      line-height: 1.55;
      color: var(--muted);
    }

    .cart-item {
      padding: 18px 0;
      border-bottom: 1px solid rgba(255,255,255,.13);
    }

    .cart-item strong {
      color: var(--white);
      font-size: 17px;
    }

    .cart-item-price {
      display: inline-block;
      margin-top: 6px;
      color: var(--gold-light);
      font-weight: 900;
    }

    .empty-cart {
      color: var(--muted);
      font-size: 17px;
      padding: 4px 0 18px;
    }

    .remove-btn {
      margin-top: 12px;

      background: transparent;
      color: var(--gold-light);

      border: 1px solid rgba(200,169,106,.55);
      padding: 9px 16px;
      border-radius: 999px;

      cursor: pointer;
      font-weight: 900;
      font-size: 14px;
    }

    .remove-btn:hover {
      background: var(--gold);
      color: var(--black);
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      align-items: center;

      margin-top: 26px;
      padding-top: 24px;

      border-top: 1px solid rgba(255,255,255,.16);

      font-size: 28px;
      font-weight: 900;
      color: var(--gold-light);
    }

    #cart-total {
      color: var(--gold-light);
    }

    .btn {
      margin-top: 32px;

      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      color: var(--black);

      border: none;
      padding: 16px 32px;
      border-radius: 999px;

      font-weight: 900;
      font-size: 15px;

      cursor: pointer;
      box-shadow: 0 14px 30px rgba(200,169,106,.18);
    }

    .btn:hover {
      transform: translateY(-1px);
      background: var(--gold-light);
    }

    /* MÓVIL */

    @media (max-width: 850px) {

      body {
        background: var(--black);
      }

      header {
        height: 66px;
        padding: 0 6%;
      }

      header a {
        font-size: 13px;
      }

      header span.logo-text {
        font-size: 15px;
      }

      .cart-icon {
        font-size: 20px;
      }

      .cart-count {
        font-size: 10px;
        min-width: 18px;
        height: 18px;
        padding: 1px 5px;
        top: -8px;
        right: -10px;
      }

      .page-content {
        padding: 24px 16px 50px;
      }

      .cart-box {
        width: 100%;
        max-width: 100%;

        padding: 28px 22px;
        border-radius: 24px;

        background: var(--black-soft);
        border: 1px solid rgba(200,169,106,.32);
      }

      .cart-box h1 {
        font-size: 32px;
        margin-bottom: 20px;
      }

      #cart-items {
        font-size: 17px;
        line-height: 1.55;
      }

      .empty-cart {
        font-size: 17px;
      }

      .cart-item {
        padding: 18px 0;
      }

      .cart-item strong {
        font-size: 17px;
      }

      .cart-total {
        font-size: 25px;
        margin-top: 24px;
        padding-top: 20px;
      }

      #cart-total {
        font-size: 27px;
      }

      .btn {
        width: 100%;
        min-height: 52px;

        display: flex;
        align-items: center;
        justify-content: center;

        margin-top: 28px;
        padding: 14px 22px;

        font-size: 16px;
      }

      .remove-btn {
        font-size: 14px;
        padding: 9px 16px;
      }
    }
  </style>
</head>

<body>

  <header>
    <a href="tienda.html">← Seguir comprando</a>

    <span class="logo-text">Café D’Medina</span>

    <div class="cart-icon" onclick="window.location.href='carrito.html'">
      🛒
      <span id="cart-count" class="cart-count">0</span>
    </div>
  </header>

  <div class="page-content">
    <div class="cart-box">

      <h1>Carrito</h1>

      <div id="cart-items"></div>

      <div class="cart-total">
        <span>Total:</span>
        <span id="cart-total">0,00 €</span>
      </div>

      <button class="btn" onclick="pagar()">
        Pagar ahora
      </button>

    </div>
  </div>

  <script src="https://js.stripe.com/v3/"></script>

  <script>
    // Stripe TEST
    const stripe = Stripe("pk_test_51TUB833gq8inlL2zJkDNL2xz4yOq0WAExmweTl5sRDxmC69Jl4bLRelvp0QGurwc4d0aP7xteOxGjWfqN5iBLKZ1000ITCPSNU");

    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

    function actualizarContador() {
      const cartCount = document.getElementById("cart-count");

      const unidades = carrito.reduce((sum, item) => {
        return sum + Number(item.cantidad || 0);
      }, 0);

      if (cartCount) {
        cartCount.textContent = unidades;
      }
    }

    function renderCart() {
      const cartItems = document.getElementById("cart-items");
      const cartTotal = document.getElementById("cart-total");

      actualizarContador();

      if (carrito.length === 0) {
        cartItems.innerHTML = `<div class="empty-cart">Tu carrito está vacío.</div>`;
        cartTotal.textContent = "0,00 €";
        localStorage.setItem("carrito", JSON.stringify(carrito));
        return;
      }

      cartItems.innerHTML = carrito.map((item, index) => {
        const subtotal = Number(item.precio) * Number(item.cantidad);

        return `
          <div class="cart-item">
            <strong>${item.nombre}</strong><br>
            ${item.peso} g · ${item.proceso}<br>
            ${item.molienda || ""} · ${item.tostion || ""}<br>
            Cantidad: ${item.cantidad}<br>

            <span class="cart-item-price">
              ${subtotal.toLocaleString("es-ES", {
                style: "currency",
                currency: "EUR"
              })}
            </span>

            <br>

            <button class="remove-btn" onclick="removeItem(${index})">
              Eliminar
            </button>
          </div>
        `;
      }).join("");

      const total = carrito.reduce((sum, item) => {
        return sum + Number(item.precio) * Number(item.cantidad);
      }, 0);

      cartTotal.textContent = total.toLocaleString("es-ES", {
        style: "currency",
        currency: "EUR"
      });
    }

    function removeItem(index) {
      carrito.splice(index, 1);
      localStorage.setItem("carrito", JSON.stringify(carrito));
      renderCart();
    }

    async function pagar() {
      if (carrito.length === 0) {
        alert("Tu carrito está vacío.");
        return;
      }

      const response = await fetch("https://cafedmedina-web.onrender.com/create-checkout-session", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ carrito })
      });

      const session = await response.json();

      stripe.redirectToCheckout({
        sessionId: session.id
      });
    }

    renderCart();
  </script>

</body>
</html>
