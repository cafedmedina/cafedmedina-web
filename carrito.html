<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrito | Café D’Medina</title>

<style>
body{
  background:#11100f;
  color:#fff;
  font-family:Arial;
  margin:0;
  padding:0;
}

header{
  padding:20px 7%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#0f0f0f;
  border-bottom:1px solid rgba(200,169,106,.2);
}

header a{
  color:#c8a96a;
  text-decoration:none;
  font-weight:bold;
}

header span{
  color:#c8a96a;
  font-weight:bold;
}

.cart-icon{
  position:relative;
  cursor:pointer;
  color:#c8a96a;
  font-size:22px;
  font-weight:900;
}

.cart-count{
  position:absolute;
  top:-10px;
  right:-14px;
  background:#c8a96a;
  color:#000;
  font-size:12px;
  padding:3px 7px;
  border-radius:50%;
}

.page-content{
  padding:40px;
}

.cart-box{
  max-width:700px;
  margin:auto;
  padding:30px;
  border-radius:24px;
  background:rgba(200,169,106,.08);
  border:1px solid rgba(200,169,106,.25);
}

.cart-total{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
  padding-top:20px;
  border-top:1px solid rgba(255,255,255,.15);
  font-size:28px;
  font-weight:700;
  color:#c8a96a;
}

.btn{
  margin-top:30px;
  background:#c8a96a;
  color:#000;
  border:none;
  padding:16px 28px;
  border-radius:40px;
  font-weight:700;
  cursor:pointer;
}

/*-------------------------------------------------------------ABRE - CAJA BONITA DE BORRAR-------------------------------------------------------------*/
.remove-btn{
  margin-top:10px;
  background:transparent;
  color:#c8a96a;
  border:1px solid rgba(200,169,106,.5);
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
  font-weight:700;
}

.remove-btn:hover{
  background:#c8a96a;
  color:#000;
}
/*-------------------------------------------------------------CIERRE - CAJA BONITA DE BORRAR-------------------------------------------------------------*/

/* MENÚ VISIBLE EN TODAS LAS PÁGINAS */
header {
  position: sticky !important;
  top: 0 !important;
  z-index: 9999 !important;
  background: rgba(17,16,15,.96) !important;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(200,169,106,.25) !important;
}




</style>






</head>

<body>

<header>
  <a href="tienda.html">← Seguir comprando</a>

  <span>Café D’Medina</span>

  <div class="cart-icon">
    🛒
    <span id="cart-count" class="cart-count">0</span>
  </div>
</header>

<div class="page-content">

  <div class="cart-box">

    <h1>Carrito</h1>

    <div id="cart-items"></div>

    <div class="cart-total">
      <span>Total:</span>
      <span id="cart-total">0,00 €</span>
    </div>

    <button class="btn" onclick="pagar()">
      Pagar ahora
    </button>

  </div>

</div>

<script src="https://js.stripe.com/v3/"></script>

<script>
// LIVE
// const stripe = Stripe("pk_live_51TUB7f32o0zCBlh7B09IcMdm5uJ33jk3pg9M3dW6v6JiwD9emPynINZ6kcVwEFzf3azPLT0wBFbZWRNRxPKdGw7l007WBI5YsY");

// TEST
const stripe = Stripe("pk_test_51TUB833gq8inlL2zJkDNL2xz4yOq0WAExmweTl5sRDxmC69Jl4bLRelvp0QGurwc4d0aP7xteOxGjWfqN5iBLKZ1000ITCPSNU");

const carrito = JSON.parse(localStorage.getItem("carrito")) || [];


function actualizarContador(){
  const cartCount = document.getElementById("cart-count");
  const unidades = carrito.reduce((sum, item) => sum + Number(item.cantidad), 0);
  cartCount.textContent = unidades;
}
/*-----------------------------------------------------------------------------------------------------------------------------------------------------------*/
function renderCart(){
  const cartItems = document.getElementById("cart-items");
  const cartTotal = document.getElementById("cart-total");
  const cartCount = document.getElementById("cart-count");

  const unidades = carrito.reduce((sum, item) => sum + Number(item.cantidad), 0);

  if (cartCount) {
    cartCount.textContent = unidades;
  }

  if(carrito.length === 0){
    cartItems.innerHTML = "Tu carrito está vacío.";
    cartTotal.textContent = "0,00 €";
    localStorage.setItem("carrito", JSON.stringify(carrito));
    return;
  }

  cartItems.innerHTML = carrito.map((item, index) => `
    <div style="padding:15px 0;border-bottom:1px solid rgba(255,255,255,.15)">
      <strong>${item.nombre}</strong><br>
      ${item.peso} g · ${item.proceso}<br>
      ${item.molienda || ""} · ${item.tostion || ""}<br>
      Cantidad: ${item.cantidad}<br>
      ${(item.precio * item.cantidad).toLocaleString("es-ES",{style:"currency",currency:"EUR"})}
      <br>
      <button class="remove-btn" onclick="removeItem(${index})">
        Eliminar
      </button>
    </div>
  `).join("");

  const total = carrito.reduce((sum,item)=>sum + item.precio * item.cantidad,0);

  cartTotal.textContent =
    total.toLocaleString("es-ES",{style:"currency",currency:"EUR"});
}
/*-----------------------------------------------------------------------------------------------------------------------------------------------------------*/

/*-----------------------------------------------------------------------------------------------------------------------------------------------------------*/
function removeItem(index){
  carrito.splice(index, 1);
  localStorage.setItem("carrito", JSON.stringify(carrito));
  renderCart();
}
/*-----------------------------------------------------------------------------------------------------------------------------------------------------------*/


/*-----------------------------------------------------------------------------------------------------------------------------------------------------------*/
async function pagar(){
  if(carrito.length === 0){
    alert("Tu carrito está vacío.");
    return;
  }

 //Const response = await fetch("http://localhost:3000/create-checkout-session",{//
const response = await fetch("https://cafedmedina-web.onrender.com/create-checkout-session",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({carrito})
  });

  const session = await response.json();

  stripe.redirectToCheckout({
    sessionId:session.id
  });
}
/*-----------------------------------------------------------------------------------------------------------------------------------------------------------*/
renderCart();
</script>

</body>
</html>
